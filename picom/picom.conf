# ==============================================================================
#  PICOM CONFIGURATION - Optimized for GTX 1080 Ti + 144Hz
# ==============================================================================

# --- Backend Settings ---
# glx: Uses your 1080 Ti's hardware acceleration.
backend = "glx";
vsync = true;

# Performance Tweaks for NVIDIA
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# Unredirect: Disables picom when a full-screen app is running (Games/Videos).
unredir-if-possible = true;

# --- Shadows ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.3;

shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Trayer'",
    "class_g = 'Dunst'",
    "_GTK_FRAME_EXTENTS@:c"
];

# --- Fading ---
fading = true;
fade-delta = 4;        # Lower = Snappier transitions
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Transparency ---
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;

# THE FIX: Chromium stays 100% opaque and "focused" always.
focus-exclude = [ 
    "class_g = 'Chromium-browser-chromium'",
    "class_g = 'Chromium'" 
];

opacity-rule = [
    "95:class_g = 'Polybar'",
    "95:class_g = 'Dunst'"
];

# --- Corners ---
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'"
];

# --- Blur (Dual-Kawase) ---
# High-quality "frosted glass" effect powered by your 1080 Ti.
blur-method = "dual_kawase";
blur-strength = 4;

blur-background-exclude = [
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'tooltip'",
    "class_g = 'Chromium-browser-chromium'",
    "class_g = 'Chromium'"
];

# --- Window Types ---
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; }
    dnd = { shadow = false; }
    popup_menu = { opacity = 0.95; }
    dropdown_menu = { opacity = 0.95; }
};
